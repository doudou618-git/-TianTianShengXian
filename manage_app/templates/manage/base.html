<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}管理后台{% endblock %} - 天天生鲜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* Layout */
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 240px;
      background: #001529;
      color: #fff;
      flex-shrink: 0;
    }
    .sidebar-logo {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-logo h2 {
      font-size: 1.2rem;
      color: #fff;
    }
    .sidebar-logo span { color: #52c41a; }
    .sidebar-menu {
      padding: 12px 0;
    }
    .menu-group-title {
      padding: 12px 20px 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }
    .menu-item {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
    }
    .menu-item:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }
    .menu-item.active {
      color: #fff;
      background: #1890ff;
    }
    .menu-item .icon { font-size: 1.1rem; }

    /* Main Content */
    .admin-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .admin-header {
      height: 56px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .logout-btn {
      padding: 4px 12px;
      border: 1px solid #d9d9d9;
      background: #fff;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      color: #1890ff;
      border-color: #1890ff;
    }

    /* Content */
    .admin-content {
      flex: 1;
      padding: 24px;
    }

    /* Page Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .page-title {
      font-size: 1.3rem;
      font-weight: 600;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
      font-weight: 600;
    }
    .card-body {
      padding: 24px;
    }

    /* Button */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: #1890ff;
      color: #fff;
    }
    .btn-primary:hover { background: #40a9ff; }
    .btn-success {
      background: #52c41a;
      color: #fff;
    }
    .btn-success:hover { background: #73d13d; }
    .btn-danger {
      background: #ff4d4f;
      color: #fff;
    }
    .btn-danger:hover { background: #ff7875; }
    .btn-warning {
      background: #faad14;
      color: #fff;
    }
    .btn-warning:hover { background: #ffc53d; }
    .btn-default {
      background: #fff;
      border: 1px solid #d9d9d9;
      color: #333;
    }
    .btn-default:hover { border-color: #1890ff; color: #1890ff; }
    .btn-sm {
      padding: 4px 10px;
      font-size: 0.8rem;
    }

    /* Table */
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th,
    .table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    .table th {
      background: #fafafa;
      font-weight: 600;
      font-size: 0.85rem;
      color: #666;
    }
    .table td {
      font-size: 0.9rem;
    }
    .table tr:hover {
      background: #fafafa;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-label .required {
      color: #ff4d4f;
      margin-left: 4px;
    }
    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
    }
    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }
    .form-hint {
      font-size: 0.8rem;
      color: #999;
      margin-top: 4px;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    /* Image Upload */
    .image-upload {
      border: 2px dashed #d9d9d9;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .image-upload:hover {
      border-color: #1890ff;
    }
    .image-upload .icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .image-preview {
      max-width: 200px;
      max-height: 200px;
      margin-top: 12px;
      border-radius: 4px;
    }

    /* Status Badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-success { background: #f6ffed; color: #52c41a; }
    .badge-danger { background: #fff2f0; color: #ff4d4f; }
    .badge-warning { background: #fffbe6; color: #faad14; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .stat-title {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1890ff;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Back Link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #1890ff;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .back-link:hover { text-decoration: underline; }

    /* Inline Form */
    .inline-form {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .inline-form .form-group {
      flex: 1;
      min-width: 200px;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <h2>天天<span>生鲜</span></h2>
      <div style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:4px;">管理后台</div>
    </div>
    <nav class="sidebar-menu">
      <div class="menu-group-title">概览</div>
      <a href="/manage/" class="menu-item {% block menu_index %}{% endblock %}">
        <span class="icon">&#127968;</span>
        <span>控制台</span>
      </a>

      <div class="menu-group-title">商品管理</div>
      <a href="/manage/categories/" class="menu-item {% block menu_category %}{% endblock %}">
        <span class="icon">&#128193;</span>
        <span>分类管理</span>
      </a>
      <a href="/manage/goods/" class="menu-item {% block menu_goods %}{% endblock %}">
        <span class="icon">&#128230;</span>
        <span>商品管理</span>
      </a>

      <div class="menu-group-title">营销活动</div>
      <a href="/manage/flashsale/" class="menu-item {% block menu_flashsale %}{% endblock %}">
        <span class="icon">&#9889;</span>
        <span>秒杀活动</span>
      </a>
      <a href="/manage/combo/" class="menu-item {% block menu_combo %}{% endblock %}">
        <span class="icon">&#127873;</span>
        <span>套餐管理</span>
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-left">
        {% block header_title %}{% endblock %}
      </div>
      <div class="header-right">
        <div class="user-info">
          <span>&#128100;</span>
          <span>{{ user.username }}</span>
        </div>
        <a href="/home/" class="btn btn-default btn-sm">返回前台</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </header>

    <!-- Content -->
    <div class="admin-content">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function logout() {
  if (confirm('确定要退出登录吗？')) {
    window.location.href = '/user/logout/';
  }
}

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
</script>

{% block scripts %}{% endblock %}

</body>
</html>
